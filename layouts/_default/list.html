{{ define "main" }}
<section>
  <h1>{{ .Title }}</h1>
  <div class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <div class="post-item">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      <time>{{ .Date.Format "2006-01-02" }}</time>
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
