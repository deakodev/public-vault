{{ define "main" }}
<section>
  <h1 class="section-title">{{ .Title }}</h1>
  {{ with .Content }}<div class="section-intro content">{{ . }}</div>{{ end }}
  <ul class="writing-list">
    {{ range .Pages.ByDate.Reverse }}
    <li>
      <a href="{{ .Permalink }}">
        <span class="post-date">{{ .Date.Format "2006 · 01" }}</span>
        <span class="post-title">{{ .Title }}</span>
      </a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
