{{ define "main" }}
<section>
  <p class="intro">{{ .Site.Params.description }}</p>
  <p class="writing-label">Essays</p>
  <ul class="writing-list">
    {{ range (where .Site.RegularPages "Section" "posts").ByDate.Reverse }}
    <li>
      <a href="{{ .Permalink }}">
        <span class="post-date">{{ .Date.Format "2006 · 01" }}</span>
        <span class="post-title">{{ .Title }}</span>
      </a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
