{{ define "main" }}
<section class="home">
  <p class="intro">{{ .Site.Params.description }}</p>
  <div class="post-list">
    {{ range (where .Site.RegularPages "Section" "posts").ByDate.Reverse }}
    <div class="post-item">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      <time>{{ .Date.Format "2006-01-02" }}</time>
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
